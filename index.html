<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الحاج حميده الشرقاوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* الألوان الأساسية */
        :root {
            --primary: #d35400; /* لون برتقالي دافئ للمطاعم */
            --bg: #1a1a1a; /* خلفية داكنة */
            --text: #ffffff;
        }

        body {
            margin: 0; 
            padding: 20px;
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg); 
            color: var(--text);
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }

        .logo { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 3px solid var(--primary); 
            margin-bottom: 10px; 
            object-fit: cover;
        }

        h1 { margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { color: #aaaaaa; margin-bottom: 30px; font-size: 1rem; }
        
        /* تصميم الزراير */
        .btn {
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 12px;
            background-color: var(--primary); 
            color: white;
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; font-size: 1.1rem;
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        .btn:hover { background-color: #e67e22; transform: translateY(-2px); }
        
        /* تصميم مختلف لزر الخريطة */
        .btn-outline { 
            background-color: transparent; 
            border: 2px solid var(--primary); 
            color: var(--primary); 
        }
        .btn-outline:hover { background-color: var(--primary); color: white; }
        
        /* تصميم خاص للواتساب */
        .btn-whatsapp { background-color: #25D366; color: white; }
        .btn-whatsapp:hover { background-color: #20b858; }
        
        /* عناوين الأقسام */
        .section-title { 
            text-align: right; 
            font-size: 1.1rem; 
            margin-top: 25px; 
            margin-bottom: 15px; 
            border-bottom: 1px solid #333; 
            padding-bottom: 5px; 
            color: #ccc;
        }
        
        /* شبكة لأرقام الاتصال عشان ماتاخدش مساحة كبيرة */
        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
    </style>
</head>
